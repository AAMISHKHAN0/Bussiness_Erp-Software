version: '3.8'

services:
  # ─── PostgreSQL Database ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_secure_2026}
      POSTGRES_DB: ${DB_NAME:-erp_production}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # ─── Backend API ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-erp_production}
      DB_USER: ${DB_USER:-erp_user}
      DB_PASSWORD: ${DB_PASSWORD:-erp_secure_2026}
      JWT_SECRET: ${JWT_SECRET:-kinetic_vault_erp_jwt_secret_2026_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-kinetic_vault_erp_refresh_secret_2026_production}
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://187.127.225.30}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
      ALLOW_DB_MOCK_FALLBACK: "false"
      LICENSE_FILE_PATH: /app/data/license.json
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
      - ./uploads:/app/uploads
    networks:
      - erp_network

  # ─── Nginx Reverse Proxy ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: erp_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - erp_network
    command: /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

volumes:
  postgres_data:
  backend_logs:
  backend_data:

networks:
  erp_network:
    driver: bridge
